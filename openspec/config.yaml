schema: spec-driven

context: |
  Celesteria (1017) is an end-side-first cross-platform ACG player.
  The repository contains a Flutter/Dart contract scaffold under lib/, tests under test/, validation scripts under tools/, and active OpenSpec specs under openspec/specs/.
  8-layer architecture: UI / Domain / Playback / Provider / Gateway / Storage / Streaming / Network.
  All external capabilities enter through Adapter, Provider, FeedSource, Profile, Gateway, or other declared extension points.
  A/V sync red line: drift < 40ms, > 120ms triggers degradation.
  OpenSpec is the active workflow authority. Trellis is retained only as legacy context.
  Phase 0-6 contract/runtime scaffolding has landed; new work must preserve the existing layer contracts and validation scripts.

rules:
  proposal:
    - Every change must respect 8-layer isolation (no cross-layer direct dependency)
    - UI must never directly depend on MPV/VLC/Bangumi/Dandanplay/libtorrent/yuc.wiki
    - Online source parsing must NOT become a prerequisite for core playback loop
    - Captcha auto-cracking is forbidden; only manual completion + same-origin session backfill
    - yuc.wiki is just another FeedSource in the RSS Engine, not a special scraper
    - iOS does not promise long-background BT download
  tasks:
    - Break tasks into chunks that align with architecture Steps (1-30)
    - Treat completed Phase 0-6 contract/runtime scaffolding as the current baseline
    - Each task must identify which layer(s) it touches
