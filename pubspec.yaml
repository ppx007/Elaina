name: elaina
description: Phase 0 foundation contracts for the Elaina cross-platform ACG player.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  html: ^0.15.6
  libtorrent_flutter: ^1.8.5
  media_kit: ^1.2.6
  media_kit_libs_windows_video: ^1.0.11
  media_kit_video: ^2.0.1
  sqlite3: ^3.3.3
  xml: ^7.0.1

dev_dependencies:
  archive: ^4.0.9
  args: ^2.7.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.5
  test: ^1.31.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/elaina_iconic_character_logo.png
    - assets/anime4k/
